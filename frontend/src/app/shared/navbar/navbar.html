<header class="topbar">
  <div class="topbar-left">
    <h1>Bonjour, {{ userName }}</h1>
    <div class="topbar-sub">{{ todayLabel }}</div>
  </div>

  <div class="topbar-actions">
    <div class="user-select" *ngIf="users.length">
      <select [ngModel]="currentUserId" (ngModelChange)="onSwitchUser($event)">
        <option *ngFor="let u of users" [value]="u.id">{{ u.first_name }} {{ u.last_name }}</option>
      </select>
    </div>

    <a class="icon-btn" routerLink="/notifications">
      <svg viewBox="0 0 24 24"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-dot" *ngIf="unreadCount > 0"></span>
    </a>

    <a class="btn btn-primary" routerLink="/planning">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouvelle session
    </a>
  </div>
</header>
