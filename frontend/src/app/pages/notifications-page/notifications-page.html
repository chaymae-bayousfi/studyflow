<div class="page">
  <div>
    <span class="eyebrow">Alertes</span>
    <h1>Notifications</h1>
    <p class="sub">Restez informé de toutes les activités importantes.</p>
  </div>

  <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>

  <div class="card">
    <div class="card-head">
      <div>
        <div class="card-title">Toutes les notifications</div>
        <div class="card-sub">{{ unreadCount }} non lues · {{ notifications.length }} au total</div>
      </div>
      <button class="btn btn-ghost" (click)="markAllRead()" *ngIf="unreadCount > 0">
        Tout marquer comme lu
      </button>
    </div>

    <div class="notif-list" *ngIf="notifications.length > 0; else empty">
      <div
        class="notif-item"
        *ngFor="let n of notifications"
        [class.unread]="!n.is_read"
      >
        <div class="notif-indicator" [class.read]="n.is_read"></div>
        <div class="notif-icon" [style.background]="iconBg(n.type)">
          <svg viewBox="0 0 24 24" [style.stroke]="iconColor(n.type)">
            <path *ngIf="n.type === 'session_reminder'" d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z"/>
            <path *ngIf="n.type === 'group_invitation'" d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <path *ngIf="n.type !== 'session_reminder' && n.type !== 'group_invitation'" d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3z"/>
          </svg>
        </div>
        <div class="notif-content">
          <div class="notif-title">{{ n.title }}</div>
          <div class="notif-body">{{ n.body }}</div>
          <div class="notif-time">{{ timeAgo(n.created_at) }}</div>
        </div>
        <div class="notif-actions">
          <span class="type-badge" [ngClass]="typeBadge(n.type)">{{ typeLabel(n.type) }}</span>
          <button class="read-btn" (click)="markRead(n)" [disabled]="n.is_read">
            {{ n.is_read ? 'Lu' : 'Marquer lu' }}
          </button>
        </div>
      </div>
    </div>

    <ng-template #empty>
      <div class="empty">Aucune notification pour le moment.</div>
    </ng-template>
  </div>
</div>
